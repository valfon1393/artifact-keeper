name: Mirror Docker Hub Images

on:
  schedule:
    # Every Monday at 4 AM UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    name: Mirror ${{ matrix.image }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: postgres:16-alpine
            target: ghcr.io/artifact-keeper/ci-mirror/postgres:16-alpine
          - image: alpine:3.19
            target: ghcr.io/artifact-keeper/ci-mirror/alpine:3.19
          - image: alpine:3.23
            target: ghcr.io/artifact-keeper/ci-mirror/alpine:3.23
          - image: python:3.12-slim
            target: ghcr.io/artifact-keeper/ci-mirror/python:3.12-slim
          - image: node:20-slim
            target: ghcr.io/artifact-keeper/ci-mirror/node:20-slim
          - image: rust:1.75-slim
            target: ghcr.io/artifact-keeper/ci-mirror/rust:1.75-slim

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror image to GHCR (preserve multi-arch manifest)
        # `buildx imagetools create` copies the full OCI index — every platform
        # manifest the upstream image publishes — without re-pulling layers per
        # platform. This is required so downstream multi-arch builds
        # (e.g. docker-publish.yml builds linux/amd64 + linux/arm64) can resolve
        # the correct arch manifest from the mirror.
        run: |
          docker buildx imagetools create \
            --tag ${{ matrix.target }} \
            ${{ matrix.image }}
